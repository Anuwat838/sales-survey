function getWeekLabel(d){
  const dt=new Date(d);
  dt.setDate(dt.getDate()-((dt.getDay()+6)%7));
  const sun=new Date(dt);sun.setDate(dt.getDate()+6);
  const f=x=>`${x.getDate()}/${x.getMonth()+1}/${x.getFullYear()}`;
  return `${f(dt)} - ${f(sun)}`;
}
const THIS_WEEK=getWeekLabel(new Date());
const TODAY=new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});

const fmtB=n=>'฿'+Number(n).toLocaleString('th-TH');

function SurveyPage({feedbacks,onSubmit,sheetsUrl,activeSites,preSelect,onNavigate}){
  const [region,setRegion]=useState(preSelect?.region||'');
  const [asCode,setAsCode]=useState(preSelect?.as_code||'');
  const [site,setSite]=useState(preSelect?.site||'');
  const [step,setStep]=useState(preSelect?.site?'form':'select');
  const [busy,setBusy]=useState(false);
  const [form,setForm]=useState({empId:'',catComments:{REF:'',WM:'',AC:''},catSituations:{REF:'',WM:'',AC:''},issues:[],overallComment:''});

  // build hierarchy from activeSites
  const regions=[...new Set(activeSites.map(s=>s.region))].sort();
  const regionASMap={};
  const asSitesMap={};
  activeSites.forEach(s=>{
    if(!regionASMap[s.region])regionASMap[s.region]=new Set();
    regionASMap[s.region].add(s.as_code);
    if(!asSitesMap[s.as_code])asSitesMap[s.as_code]=[];
    asSitesMap[s.as_code].push(s);
  });

  const asCodes=region?[...( regionASMap[region]||new Set())].sort():[];
  const sites=asCode?asSitesMap[asCode]||[]:[];
  const siteData=activeSites.find(s=>s.site===site);
  const done=feedbacks.some(f=>f.site===site&&f.week===THIS_WEEK);

  const toggleIssue=i=>setForm(p=>({...p,issues:p.issues.includes(i)?p.issues.filter(x=>x!==i):[...p.issues,i]}));

  const reset=()=>{setStep('select');setRegion('');setAsCode('');setSite('');setForm({empId:'',catComments:{REF:'',WM:'',AC:''},catSituations:{REF:'',WM:'',AC:''},issues:[],overallComment:''});};

  const submit=async()=>{
    if(!form.empId)return;
    setBusy(true);
    const payload={week:THIS_WEEK,region,as_code:asCode,account:siteData?.account||'',site,submittedAt:new Date().toISOString(),submitterName:form.empId,catSituations:form.catSituations,issues:form.issues,overallComment:form.overallComment,catComments:form.catComments,sales:{REF:siteData?.REF,WM:siteData?.WM,AC:siteData?.AC}};
    await onSubmit(payload);
    setBusy(false);setStep('done');
  };

  if(step==='done') return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'60vh',gap:20,textAlign:'center'}}>
      <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,#22c55e,#16a34a)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,color:'#fff',boxShadow:'0 8px 32px rgba(34,197,94,.35)'}}>✓</div>
      <div>
        <h2 style={{margin:'0 0 8px',fontSize:22}}>ส่ง Feedback สำเร็จ!</h2>
        <p style={{margin:0,color:'#6b7280',fontSize:14}}>{site} · {THIS_WEEK}</p>
        {sheetsUrl&&<p style={{margin:'8px 0 0',fontSize:13,color:'#3b82f6'}}>✓ บันทึก Google Sheets แล้ว</p>}
      </div>
      <button onClick={()=>{
        // ถ้ามาจาก Performance ให้กลับไป Performance โดย pre-select region+asCode เดิม
        if(onNavigate&&preSelect){
          onNavigate('performance',{region,as_code:asCode});
        } else {
          reset();
        }
      }} style={btn('#1e293b')}>ส่ง Feedback สาขาอื่น</button>
    </div>
  );

  return(
    <div style={{maxWidth:700,margin:'0 auto'}}>
      <div style={card}>
        <label style={lbl}>1. เลือก Region</label>
        <select value={region} onChange={e=>{setRegion(e.target.value);setAsCode('');setSite('');}} style={sel}>
          <option value=''>-- เลือก Region --</option>
          {regions.map(r=><option key={r}>{r}</option>)}
        </select>
        {region&&<>
          <label style={{...lbl,marginTop:14}}>2. เลือก AS Code</label>
          <select value={asCode} onChange={e=>{setAsCode(e.target.value);setSite('');}} style={sel}>
            <option value=''>-- เลือก AS Code --</option>
            {asCodes.map(a=><option key={a}>{a}</option>)}
          </select>
        </>}
        {asCode&&<>
          <label style={{...lbl,marginTop:14}}>3. เลือกสาขา</label>
          <select value={site} onChange={e=>{setSite(e.target.value);setStep(e.target.value?'form':'select');}} style={sel}>
            <option value=''>-- เลือกสาขา ({sites.length} สาขา) --</option>
            {sites.map(s=><option key={s.site}>{s.site}</option>)}
          </select>
        </>}
        {site&&<p style={{margin:'10px 0 0',fontSize:12,color:'#6b7280'}}>สัปดาห์: {THIS_WEEK}</p>}
      </div>

      {site&&siteData&&(
        <div style={{...card,background:'linear-gradient(135deg,#0f172a,#1e3a5f)',color:'#fff',marginTop:16}}>
          <div style={{fontSize:11,opacity:.6,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:16}}>
            ยอดขายรวม · อัพเดต {TODAY} — {site}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
            {CATS.map(cat=>{
              const d=siteData[cat];const ap=achPct(d.sell,d.target);
              return(<div key={cat} style={{background:'rgba(255,255,255,.08)',borderRadius:10,padding:'12px 14px',borderTop:`3px solid ${CAT_COLORS[cat]}`}}>
                <div style={{fontSize:11,opacity:.7,fontWeight:700,marginBottom:6,color:CAT_COLORS[cat]}}>{cat} — {CAT_LABELS[cat]}</div>
                <div style={{fontSize:18,fontWeight:800}}>{fmtB(d.sell)}</div>

                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>

                </div>
                <div>
                  <label style={{...lbl,fontSize:11}}>ความเห็น / วิเคราะห์ยอดขาย</label>
                  <textarea value={form.catComments[cat]} onChange={e=>setForm(p=>({...p,catComments:{...p.catComments,[cat]:e.target.value}}))}
                    placeholder={`วิเคราะห์ยอดขาย ${cat}...`} rows={2}

              </div>
            ))}
          </div>

          <div style={{marginBottom:16}}>
            <label style={lbl}>ปัญหาที่พบ (เลือกได้หลายข้อ)</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:4}}>
              {ISSUES.map(i=>(
                <button key={i} onClick={()=>toggleIssue(i)}
                  style={{padding:'7px 13px',borderRadius:20,border:`2px solid ${form.issues.includes(i)?'#1e293b':'#e5e7eb'}`,background:form.issues.includes(i)?'#1e293b':'#fff',color:form.issues.includes(i)?'#fff':'#6b7280',fontSize:12,cursor:'pointer',fontWeight:500,transition:'all .15s'}}>{i}</button>
              ))}
            </div>
          </div>

          <div style={{marginBottom:20}}>
            <label style={lbl}>ความเห็นภาพรวม</label>
            <textarea value={form.overallComment} onChange={e=>setForm(p=>({...p,overallComment:e.target.value}))}
              placeholder='สรุปภาพรวมสัปดาห์นี้...' rows={3} style={{...inp,resize:'vertical',lineHeight:1.6}}/>
          </div>

          <button onClick={submit} disabled={busy||!form.empId} style={btn(!form.empId?'#e5e7eb':'#1e293b',!form.empId)}>
            {busy?'กำลังส่ง...':'ส่ง Feedback'}
          </button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// DASHBOARD
// ============================================================
function DashboardPage({feedbacks,activeSites}){
  const [rf,setRf]=useState('ALL');
  const [af,setAf]=useState('ALL');
  const [ac,setAc]=useState('ALL');
  const [chartMode,setChartMode]=useState('ach'); // 'ach' | 'sell'
  const [top30Region,setTop30Region]=useState('ALL');

  const regions=[...new Set(activeSites.map(s=>s.region))].sort();
  const availableAccounts=[...new Set((rf==='ALL'?activeSites:activeSites.filter(s=>s.region===rf)).map(s=>s.account||'Unknown').filter(Boolean))].sort();
  const availableAS=[...new Set(activeSites.filter(s=>(rf==='ALL'||s.region===rf)&&(ac==='ALL'||s.account===ac)).map(s=>s.as_code))].sort();

  const handleRegionChange=e=>{setRf(e.target.value);setAf('ALL');setAc('ALL');};
  const handleAccountChange=e=>{setAc(e.target.value);setAf('ALL');};

  const sites=activeSites.filter(s=>(rf==='ALL'||s.region===rf)&&(ac==='ALL'||s.account===ac)&&(af==='ALL'||s.as_code===af));

  // Summary totals
  const tSell=cat=>sites.reduce((s,x)=>s+(x[cat]?.sell||0),0);
  const tTarget=cat=>sites.reduce((s,x)=>s+(x[cat]?.target||0),0);
  const grandGap=(tSell('REF')+tSell('WM')+tSell('AC'))-(tTarget('REF')+tTarget('WM')+tTarget('AC'));

  // Heat Map — by Region
  const allRegions=[...new Set(sites.map(s=>s.region))].sort();
  const regionStats=r=>{
    const rs=sites.filter(s=>r==='ALL'||s.region===r);
    return CATS.map(cat=>({
      cat,
      sell:rs.reduce((s,x)=>s+(x[cat]?.sell||0),0),
      target:rs.reduce((s,x)=>s+(x[cat]?.target||0),0),
    }));
  };

  // Gap by region
  const regionGap=r=>{
    const rs=sites.filter(s=>s.region===r);
    return CATS.reduce((o,cat)=>{
      o[cat]=(rs.reduce((s,x)=>s+(x[cat]?.sell||0),0))-(rs.reduce((s,x)=>s+(x[cat]?.target||0),0));
      return o;
    },{});
  };
  const maxAbsGap=Math.max(...allRegions.map(r=>{const g=regionGap(r);return Math.max(...CATS.map(c=>Math.abs(g[c]||0)));}),1);

  // คำนวณ Time Gone (วันอาทิตย์ล่าสุด) สำหรับ Dashboard
  const _today=new Date();
  const _lastSun=new Date(_today);
  _lastSun.setDate(_today.getDate()-_today.getDay());
  const _refDate=_today.getDay()===0?_today:_lastSun;
  const _dim=new Date(_refDate.getFullYear(),_refDate.getMonth()+1,0).getDate();
  const dashTgPct=Math.round((_refDate.getDate()/_dim)*100);

  function achBadge(ap){
    if(ap>=dashTgPct)return{bg:'#EAF3DE',color:'#3B6D11'};
    if(ap>=80)return{bg:'#FAEEDA',color:'#854F0B'};
    return{bg:'#FCEBEB',color:'#A32D2D'};
  }
  function gapColor(v){return v>=0?'#3B6D11':v>=-1000000?'#854F0B':'#A32D2D';}
  function fmtGap(v){return(v>=0?'+':'')+fmtB(v);}
  function fmtM(v){return'฿'+(v/1000000).toFixed(2)+'M';}

  const thStyle={padding:'5px 8px',textAlign:'right',color:'#6b7280',fontWeight:500,fontSize:11};
  const tdStyle={padding:'6px 8px',textAlign:'right',color:'#6b7280',fontSize:12};
  const blStyle={borderLeft:'0.5px solid #e5e7eb'};

  return(<div>
    {/* ① Filters */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}}>
      <div>
        <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>Account</div>
        <select value={ac} onChange={handleAccountChange} style={{...sel}}>
          <option value='ALL'>ทุก Account</option>
          {availableAccounts.map(a=><option key={a}>{a}</option>)}
        </select>
      </div>
      <div>
        <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>Region</div>
        <select value={rf} onChange={handleRegionChange} style={{...sel}}>
          <option value='ALL'>ทุก Region</option>
          {regions.map(r=><option key={r}>{r}</option>)}
        </select>
      </div>
      <div>
        <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>AS Code</div>
        <select value={af} onChange={e=>setAf(e.target.value)} style={{...sel}}>
          <option value='ALL'>ทุก AS Code</option>
          {availableAS.map(a=><option key={a}>{a}</option>)}
        </select>
      </div>
    </div>

    {/* ② Summary Cards */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14}}>
      {CATS.map(cat=>{
        const sell=tSell(cat);const target=tTarget(cat);const ap=achPct(sell,target);
        return(<div key={cat} style={{background:'#f8fafc',borderRadius:12,padding:'14px 16px',borderTop:`3px solid ${CAT_COLORS[cat]}`}}>
          <div style={{fontSize:11,color:'#6b7280',marginBottom:4,letterSpacing:'.04em',textTransform:'uppercase'}}>{cat} รวม</div>
          <div style={{fontSize:20,fontWeight:700,color:'#111'}}>{fmtM(sell)}</div>
          <div style={{fontSize:12,color:'#6b7280',marginTop:3}}>เป้า {fmtM(target)} · <span style={{fontWeight:700,color:ap>=100?'#3B6D11':ap>=80?'#854F0B':'#A32D2D'}}>{ap}%</span></div>
        </div>);
      })}
      <div style={{background:'#f8fafc',borderRadius:12,padding:'14px 16px',borderTop:'3px solid #E24B4A'}}>
        <div style={{fontSize:11,color:'#6b7280',marginBottom:4,letterSpacing:'.04em',textTransform:'uppercase'}}>Gap to Target</div>
        <div style={{fontSize:20,fontWeight:700,color:'#A32D2D'}}>{fmtM(grandGap)}</div>
        <div style={{fontSize:12,color:'#6b7280',marginTop:3}}>ต้องขายเพิ่มรวม</div>
      </div>
    </div>

    {/* ③ Grouped Bar Chart */}
    {(()=>{
      const today=new Date();
      const lastSunday=new Date(today);
      lastSunday.setDate(today.getDate()-today.getDay());
      const refDate=today.getDay()===0?today:lastSunday;
      const dayOfMonth=refDate.getDate();
      const daysInMonth=new Date(refDate.getFullYear(),refDate.getMonth()+1,0).getDate();
      const tgPct=Math.round((dayOfMonth/daysInMonth)*100);

      // คำนวณ max value สำหรับ scale
      const chartData=allRegions.map(r=>{
        const rs=sites.filter(s=>s.region===r);
        return {
          r,
          REF: chartMode==='ach'
            ? achPct(rs.reduce((s,x)=>s+(x.REF?.sell||0),0), rs.reduce((s,x)=>s+(x.REF?.target||0),0))
            : rs.reduce((s,x)=>s+(x.REF?.sell||0),0)/1000000,
          WM: chartMode==='ach'
            ? achPct(rs.reduce((s,x)=>s+(x.WM?.sell||0),0), rs.reduce((s,x)=>s+(x.WM?.target||0),0))
            : rs.reduce((s,x)=>s+(x.WM?.sell||0),0)/1000000,
          AC: chartMode==='ach'
            ? achPct(rs.reduce((s,x)=>s+(x.AC?.sell||0),0), rs.reduce((s,x)=>s+(x.AC?.target||0),0))
            : rs.reduce((s,x)=>s+(x.AC?.sell||0),0)/1000000,
        };
      });
      const maxVal=Math.max(...chartData.flatMap(d=>[d.REF,d.WM,d.AC]), chartMode==='ach'?120:10);
      const chartH=200; const chartY0=220; const chartX0=60;
      const groupW=120; const barW=20; const barGap=4;
      const totalW=chartX0+allRegions.length*groupW+40;
      // y position ของค่า v
      const yPos=v=>chartY0-Math.min(v/maxVal,1.2)*chartH;
      // y position ของ Time Gone line (Ach% mode = tgPct, sell mode ไม่แสดง)
      const tgY=chartMode==='ach'?yPos(tgPct):null;
      const h100Y=chartMode==='ach'?yPos(100):null;

      return(
        <div style={{...card,marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4,flexWrap:'wrap',gap:8}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:'#111'}}>Performance by Region & Category</div>
              <div style={{fontSize:11,color:'#6b7280',marginTop:2}}>
                {chartMode==='ach'?`เส้นประแดง = Time Gone ${tgPct}%`:'ยอดขาย (M฿) แยกตาม Region'}
              </div>
            </div>
            <div style={{display:'flex',gap:6}}>
              {[['ach','Ach%'],['sell','Sell (M฿)']].map(([v,l])=>(
                <button key={v} onClick={()=>setChartMode(v)}
                  style={{padding:'6px 14px',borderRadius:8,border:`1.5px solid ${chartMode===v?'#1e293b':'#e5e7eb'}`,background:chartMode===v?'#1e293b':'#fff',color:chartMode===v?'#fff':'#6b7280',fontSize:12,fontFamily:'inherit',fontWeight:500,cursor:'pointer'}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:14,marginBottom:10,flexWrap:'wrap'}}>
            {CATS.map(c=>(
              <span key={c} style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#6b7280'}}>
                <span style={{width:10,height:10,borderRadius:2,background:CAT_COLORS[c],display:'inline-block'}}/>
                {c}
              </span>
            ))}
            {chartMode==='ach'&&<span style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#ef4444'}}><span style={{width:14,borderTop:'2px dashed #ef4444',display:'inline-block'}}/>Time Gone {tgPct}%</span>}
          </div>
          <div style={{overflowX:'auto'}}>
            <svg viewBox={`0 0 ${totalW} 250`} style={{width:'100%',minWidth:400}}>
              {/* Grid lines */}
              {[0,25,50,75,100].map(v=>{
                const y=yPos(chartMode==='ach'?v:v/100*maxVal);
                return(<g key={v}>
                  <line x1={chartX0} y1={y} x2={totalW-10} y2={y} stroke='#f1f5f9' strokeWidth='1'/>
                  <text x={chartX0-5} y={y+4} textAnchor='end' fontSize='9' fill='#9ca3af'>
                    {chartMode==='ach'?`${Math.round(v/100*maxVal)}%`:`${(v/100*maxVal).toFixed(1)}M`}
                  </text>
                </g>);
              })}
              {/* 100% line (Ach mode) */}
              {h100Y&&<line x1={chartX0} y1={h100Y} x2={totalW-10} y2={h100Y} stroke='#d1d5db' strokeWidth='1.5' strokeDasharray='4,3'/>}
              {/* Time Gone line */}
              {tgY&&<>
                <line x1={chartX0} y1={tgY} x2={totalW-10} y2={tgY} stroke='#ef4444' strokeWidth='1.5' strokeDasharray='6,4' opacity='0.75'/>
                <text x={totalW-8} y={tgY+4} fontSize='9' fill='#ef4444'>{tgPct}%</text>
              </>}
              {/* Bars */}
              {chartData.map((d,gi)=>{
                const gx=chartX0+gi*groupW+16;
                const cats=[{c:'REF',v:d.REF,col:CAT_COLORS.REF},{c:'WM',v:d.WM,col:CAT_COLORS.WM},{c:'AC',v:d.AC,col:CAT_COLORS.AC}];
                return(<g key={d.r}>
                  {cats.map((ct,ci)=>{
                    const bx=gx+ci*(barW+barGap);
                    const by=yPos(ct.v);
                    const bh=chartY0-by;
                    const ap=ct.v;
                    const barCol=ct.col;
                    return(<g key={ct.c}>
                      <rect x={bx} y={by} width={barW} height={Math.max(bh,0)} fill={barCol} rx='2' opacity='.85'/>
                      <text x={bx+barW/2} y={by-3} textAnchor='middle' fontSize='8.5' fill={barCol} fontWeight='600'>
                        {chartMode==='ach'?`${Math.round(ap)}%`:`${ap.toFixed(1)}`}
                      </text>
                    </g>);
                  })}
                  <text x={gx+(barW+barGap)*1.5} y={chartY0+14} textAnchor='middle' fontSize='10' fill='#374151' fontWeight='500'>{d.r.replace('NORTHEAST','NE').replace('CENTRAL','CENTRAL').replace('BANGKOK','BKK').replace('NORTH','NORTH').replace('SOUTH','SOUTH')}</text>
                </g>);
              })}
              {/* Axes */}
              <line x1={chartX0} y1={20} x2={chartX0} y2={chartY0} stroke='#e5e7eb' strokeWidth='1'/>
              <line x1={chartX0} y1={chartY0} x2={totalW-10} y2={chartY0} stroke='#e5e7eb' strokeWidth='1'/>
            </svg>
          </div>
        </div>
      );
    })()}

    {/* ④ Heat Map */}
    <div style={{...card,marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:700,color:'#111',marginBottom:3}}>Heat Map — Ach% by Region × Category</div>
      <div style={{fontSize:11,color:'#6b7280',marginBottom:14}}>แสดง Sell / Target / Ach% ต่อ Region</div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead>
            <tr style={{borderBottom:'0.5px solid #e5e7eb'}}>
              <th style={{...thStyle,textAlign:'left',width:'13%'}}>Region</th>
              {CATS.map(cat=>(
                <th key={cat} colSpan={3} style={{...thStyle,textAlign:'center',color:cat==='REF'?'#185FA5':cat==='WM'?'#534AB7':'#0F6E56',...blStyle}}>{cat}</th>
              ))}
            </tr>
            <tr style={{borderBottom:'0.5px solid #e5e7eb',background:'#f8fafc'}}>
              <th style={{padding:'4px 8px'}}/>
              {CATS.map(cat=>[
                <th key={cat+'s'} style={{...thStyle,...blStyle}}>Sell</th>,
                <th key={cat+'t'} style={thStyle}>Target</th>,
                <th key={cat+'a'} style={thStyle}>Ach%</th>,
              ])}
            </tr>
          </thead>
          <tbody>
            {allRegions.map(r=>{
              const stats=regionStats(r);
              return(<tr key={r} style={{borderTop:'0.5px solid #f1f5f9'}}>
                <td style={{padding:'7px 8px',fontWeight:600,color:'#111',fontSize:12}}>{r}</td>
                {stats.map(({cat,sell,target})=>{
                  const ap=achPct(sell,target);
                  const {bg,color}=achBadge(ap);
                  return[
                    <td key={cat+'s'} style={{...tdStyle,...blStyle}}>{fmtM(sell)}</td>,
                    <td key={cat+'t'} style={tdStyle}>{fmtM(target)}</td>,
                    <td key={cat+'a'} style={{...tdStyle,textAlign:'right'}}>
                      <span style={{padding:'2px 7px',borderRadius:6,background:bg,color,fontSize:11,fontWeight:700}}>{ap}%</span>
                    </td>,
                  ];
                })}
              </tr>);
            })}
            {/* แถวรวม */}
            <tr style={{borderTop:'1px solid #e5e7eb',background:'#f8fafc'}}>
              <td style={{padding:'7px 8px',fontWeight:700,color:'#111',fontSize:12}}>รวม</td>
              {CATS.map(cat=>{
                const sell=tSell(cat);const target=tTarget(cat);const ap=achPct(sell,target);
                const {bg,color}=achBadge(ap);
                return[
                  <td key={cat+'s'} style={{...tdStyle,fontWeight:700,color:'#111',...blStyle}}>{fmtM(sell)}</td>,
                  <td key={cat+'t'} style={{...tdStyle,fontWeight:700,color:'#111'}}>{fmtM(target)}</td>,
                  <td key={cat+'a'} style={{...tdStyle}}>
                    <span style={{padding:'2px 7px',borderRadius:6,background:bg,color,fontSize:11,fontWeight:700}}>{ap}%</span>
                  </td>,
                ];
              })}
            </tr>
          </tbody>
        </table>
      </div>
      <div style={{display:'flex',gap:14,marginTop:10,fontSize:11,color:'#6b7280'}}>
        {[['#FCEBEB','#F09595','<80%'],['#FAEEDA','#EF9F27','80–99%'],['#EAF3DE','#97C459','≥100%']].map(([bg,border,label])=>(
          <span key={label} style={{display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:10,height:10,borderRadius:2,background:bg,border:`0.5px solid ${border}`,display:'inline-block'}}/>
            {label}
          </span>
        ))}
      </div>
    </div>

    {/* ④ Gap to Target */}
    <div style={{...card,marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:700,color:'#111',marginBottom:3}}>Gap to Target — แยกตาม Region × Category</div>
      <div style={{fontSize:11,color:'#6b7280',marginBottom:14}}>ยอดที่ต้องขายเพิ่ม — ค่าบวก = เกินเป้า</div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>

          <tr style={{borderBottom:'0.5px solid #e5e7eb'}}>

          {allRegions.map(r=>{
            const g=regionGap(r);
            const total=CATS.reduce((s,cat)=>s+(g[cat]||0),0);

  const code=`function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    const ss = SpreadsheetApp.getActiveSpreadsheet();

    appendRow(ss, "ALL", [
      data.submittedAt, data.week, data.region, data.as_code, data.site,
      data.submitterName, (data.issues||[]).join(", "), data.overallComment,
      data.catSituations?.REF, data.catComments?.REF, data.sales?.REF?.sell, data.sales?.REF?.target,
      data.catSituations?.WM, data.catComments?.WM, data.sales?.WM?.sell, data.sales?.WM?.target,
      data.catSituations?.AC, data.catComments?.AC, data.sales?.AC?.sell, data.sales?.AC?.target,
    ]);

    ["REF","WM","AC"].forEach(cat => {

}

function appendRow(ss, sheetName, row) {
  let sheet = ss.getSheetByName(sheetName);
  if (!sheet) {
    sheet = ss.insertSheet(sheetName);
    const headers = {
      ALL: ["Timestamp","Week","Region","AS Code","Site","รหัสพนักงาน","ปัญหา","ความเห็นรวม",

      WM:  ["Timestamp","Week","Region","AS Code","Site","รหัสพนักงาน","Situation","Comment","Sell","Target","ปัญหา"],
      AC:  ["Timestamp","Week","Region","AS Code","Site","รหัสพนักงาน","Situation","Comment","Sell","Target","ปัญหา"],
    };
    sheet.appendRow(headers[sheetName]||["Data"]);
    sheet.getRange(1,1,1,sheet.getLastColumn())
      .setBackground("#1e293b").setFontColor("#ffffff").setFontWeight("bold");
  }
  sheet.appendRow(row);
}`;

const ADMIN_PASSCODE = '1234'; // ← เปลี่ยน passcode ที่นี่ได้เลยครับ

function PasscodeLock({onUnlock,title}){
  const [input,setInput]=useState('');
  const [error,setError]=useState(false);
  const [shake,setShake]=useState(false);

  function handleKey(k){
    if(input.length>=6)return;
    const next=input+k;
    setInput(next);
    setError(false);
    if(next.length===ADMIN_PASSCODE.length){
      if(next===ADMIN_PASSCODE){
        onUnlock();
      } else {
        setShake(true);
        setError(true);
        setTimeout(()=>{setInput('');setShake(false);},600);
      }
    }
  }

  function handleDel(){setInput(p=>p.slice(0,-1));setError(false);}

  const keys=['1','2','3','4','5','6','7','8','9','','0','⌫'];

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh'}}>
      <div style={{background:'#fff',borderRadius:20,padding:'36px 32px',boxShadow:'0 8px 40px rgba(0,0,0,.12)',textAlign:'center',width:300}}>
        <div style={{fontSize:32,marginBottom:8}}>🔒</div>
        <h3 style={{margin:'0 0 4px',fontSize:18,fontWeight:700,color:'#111'}}>{title}</h3>
        <p style={{margin:'0 0 24px',fontSize:13,color:'#9ca3af'}}>กรอก Passcode เพื่อเข้าใช้งาน</p>

        {/* Dots */}
        <div style={{display:'flex',justifyContent:'center',gap:12,marginBottom:28,
          animation:shake?'shake .4s ease':'none'}}>
          {Array.from({length:ADMIN_PASSCODE.length}).map((_,i)=>(
            <div key={i} style={{width:14,height:14,borderRadius:'50%',
              background:i<input.length?(error?'#ef4444':'#1e293b'):'#e5e7eb',
              transition:'background .15s'}}/>
          ))}
        </div>

        {/* Keypad */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
          {keys.map((k,i)=>(
            <button key={i} onClick={()=>k==='⌫'?handleDel():k?handleKey(k):null}
              disabled={!k}
              style={{padding:'16px 0',borderRadius:12,border:'none',
                background:k?'#f1f5f9':'transparent',
                color:k==='⌫'?'#ef4444':'#1e293b',
                fontSize:k==='⌫'?20:20,fontWeight:700,cursor:k?'pointer':'default',
                transition:'all .1s',opacity:k?1:0}}>
              {k}
            </button>
          ))}
        </div>

        {error&&<p style={{margin:'16px 0 0',fontSize:13,color:'#ef4444',fontWeight:600}}>Passcode ไม่ถูกต้อง</p>}
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-8px)}80%{transform:translateX(4px)}}`}</style>
    </div>
  );
}

// ADMIN PAGE — อัพโหลด Excel/CSV อัพเดตยอดขาย
// ============================================================
function AdminPage({onUpdateSales}){
  const [preview,setPreview]=useState(null);
  const [errors,setErrors]=useState([]);
  const [saved,setSaved]=useState(false);
  const [dragging,setDragging]=useState(false);
  const fileRef=useRef(null);

  // คอลัมน์ที่ต้องการจาก Excel (ตรงกับ BIG_C format)
  // Region | AS codename | Site Name | REF Sell Out | REF Target | ... | WM Sell Out | WM Target | ... | AC Sell Out | AC Target
  function parseWorkbook(wb){
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(rows.length<2){setErrors(['ไม่พบข้อมูลในไฟล์']);return;}

    const header=rows[0].map(h=>String(h).trim());
    // หา index คอลัมน์
    const findCol=(keywords)=>{
      const idx=header.findIndex(h=>keywords.some(k=>h.toLowerCase().includes(k.toLowerCase())));
      return idx;
    };
    const iRegion=findCol(['region']);
    const iAS=findCol(['as code','as codename','codename']);
    const iAccount=findCol(['account']);
    const iSite=findCol(['site name','site']);
    const iREFSell=findCol(['ref sell','ref so']);
    const iREFTarget=findCol(['ref target']);
    const iWMSell=findCol(['wm sell','wm so']);
    const iWMTarget=findCol(['wm target']);
    const iACSell=findCol(['ac sell','ac so']);
    const iACTarget=findCol(['ac target']);
    const iPCStatus=findCol(['pc status','status']);

    const errs=[];
    if(iRegion<0)errs.push('ไม่พบคอลัมน์ Region');
    if(iSite<0)errs.push('ไม่พบคอลัมน์ Site Name');
    if(iREFSell<0)errs.push('ไม่พบคอลัมน์ REF Sell Out');
    if(errs.length){setErrors(errs);return;}

    const parsed=[];
    rows.slice(1).forEach((row,i)=>{
      const region=String(row[iRegion]||'').trim();
      const as_code=String(row[iAS]||'').trim();
      const account=String(row[iAccount]||'').trim()||'Unknown';
      const site=String(row[iSite]||'').trim();
      if(!region||!site||region==='NA')return;
      parsed.push({
        region, as_code, account, site,
        REF:{sell:Number(row[iREFSell])||0, target:Number(row[iREFTarget])||0},
        WM:{sell:Number(row[iWMSell])||0, target:Number(row[iWMTarget])||0},
        AC:{sell:Number(row[iACSell])||0, target:Number(row[iACTarget])||0},
        pc_status:String(row[iPCStatus]||'').trim(),
      });
    });

    if(parsed.length===0){setErrors(['ไม่พบข้อมูลสาขา ตรวจสอบชื่อคอลัมน์ครับ']);return;}
    setErrors([]);
    setPreview(parsed);
  }

  function handleFile(file){
    if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['xlsx','xls','csv'].includes(ext)){setErrors(['รองรับเฉพาะ .xlsx, .xls, .csv เท่านั้น']);return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        parseWorkbook(wb);
      }catch(err){setErrors(['อ่านไฟล์ไม่สำเร็จ: '+err.message]);}
    };
    reader.readAsArrayBuffer(file);
  }

  function handleDrop(e){
    e.preventDefault();setDragging(false);
    handleFile(e.dataTransfer.files[0]);
  }

  const [syncing,setSyncing]=useState(false);

  async function confirmUpdate(){
    setSyncing(true);
    await onUpdateSales(preview);
    setSyncing(false);
    setSaved(true);
    setPreview(null);
    setTimeout(()=>setSaved(false),4000);
  }

  const regions=[...new Set((preview||[]).map(s=>s.region))];
  const totalSites=(preview||[]).length;

  return(<div style={{maxWidth:760,margin:'0 auto'}}>
    {saved&&(
      <div style={{padding:'16px 20px',borderRadius:12,background:'#dcfce7',border:'1px solid #86efac',color:'#16a34a',fontWeight:700,marginBottom:20,fontSize:15}}>
        ✓ อัพเดตยอดขายสำเร็จ! {totalSites} สาขา — ระบบใช้ข้อมูลใหม่ทันที
      </div>
    )}

    {/* Upload Zone */}
    <div style={card}>
      <h3 style={{margin:'0 0 4px',fontSize:18,fontWeight:700}}>📤 อัพโหลดไฟล์ยอดขาย</h3>
      <p style={{margin:'0 0 20px',color:'#6b7280',fontSize:13}}>รองรับ .xlsx / .xls / .csv · โครงสร้างเดิมจาก BIG_C_APR_2026.xlsx</p>

      {/* Drop Zone */}
      <div
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={handleDrop}
        onClick={()=>fileRef.current.click()}
        style={{border:`2px dashed ${dragging?'#3b82f6':'#cbd5e1'}`,borderRadius:14,padding:'40px 20px',textAlign:'center',cursor:'pointer',background:dragging?'#eff6ff':'#f8fafc',transition:'all .2s',marginBottom:16}}>
        <div style={{fontSize:40,marginBottom:12}}>📁</div>
        <div style={{fontWeight:700,fontSize:15,color:'#1e293b',marginBottom:6}}>ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือกไฟล์</div>
        <div style={{fontSize:12,color:'#94a3b8'}}>.xlsx · .xls · .csv</div>
        <input ref={fileRef} type='file' accept='.xlsx,.xls,.csv' style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
      </div>

      {/* รูปแบบคอลัมน์ที่ต้องการ */}
      <div style={{padding:'12px 16px',borderRadius:10,background:'#f1f5f9',fontSize:12,color:'#475569'}}>
        <div style={{fontWeight:700,marginBottom:6}}>📋 คอลัมน์ที่ต้องมีในไฟล์</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'6px 16px'}}>
          {['Region','AS codename','Account','Site Name','REF Sell Out','REF Target','WM Sell Out','WM Target','AC Sell Out','AC Target','PC Status'].map(c=>(
            <span key={c} style={{padding:'2px 8px',borderRadius:8,background:'#e2e8f0',fontFamily:'monospace',fontSize:11}}>{c}</span>
          ))}
        </div>
      </div>

      {/* Errors */}
      {errors.length>0&&(
        <div style={{marginTop:14,padding:'12px 16px',borderRadius:10,background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',fontSize:13}}>
          {errors.map((e,i)=><div key={i}>⚠️ {e}</div>)}
        </div>
      )}
    </div>

    {/* Preview */}
    {preview&&(
      <div style={{...card,marginTop:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <div>
            <h4 style={{margin:0,fontSize:16,fontWeight:700}}>ตัวอย่างข้อมูลที่จะอัพเดต</h4>
            <p style={{margin:'4px 0 0',fontSize:13,color:'#6b7280'}}>{totalSites} สาขา · {regions.length} Region</p>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{setPreview(null);setErrors([]);}}
              style={{padding:'10px 18px',borderRadius:10,border:'2px solid #e5e7eb',background:'#fff',color:'#6b7280',fontWeight:600,cursor:'pointer',fontSize:13}}>
              ยกเลิก
            </button>
            <button onClick={confirmUpdate} disabled={syncing}
              style={{padding:'10px 22px',borderRadius:10,border:'none',background:syncing?'#6b7280':'linear-gradient(135deg,#16a34a,#15803d)',color:'#fff',fontWeight:700,cursor:syncing?'not-allowed':'pointer',fontSize:14}}>
              {syncing?'⏳ กำลัง Sync...':'✓ ยืนยันอัพเดต '+totalSites+' สาขา'}
            </button>
          </div>
        </div>

        {/* Summary by Region */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {regions.map(r=>{
            const cnt=preview.filter(s=>s.region===r).length;
            return(<span key={r} style={{padding:'4px 12px',borderRadius:20,background:'#1e293b',color:'#fff',fontSize:12,fontWeight:600}}>
              {r}: {cnt} sites
            </span>);
          })}
        </div>

        {/* Table preview */}
        <div style={{overflowX:'auto',borderRadius:10,border:'1px solid #e5e7eb'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{background:'#f8fafc'}}>
                {['Region','AS Code','Account','Site','REF Sell','REF Target','WM Sell','WM Target','AC Sell','AC Target','Status'].map(h=>(
                  <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:700,color:'#6b7280',borderBottom:'1px solid #e5e7eb',whiteSpace:'nowrap',fontSize:11}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {preview.slice(0,15).map((row,i)=>(
                <tr key={i} style={{borderBottom:'1px solid #f1f5f9'}}>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{row.region}</td>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{row.as_code}</td>
                  <td style={{padding:'8px 12px'}}>
                    <span style={{padding:'2px 8px',borderRadius:8,background:'#eff6ff',color:'#3b82f6',fontSize:11,fontWeight:700}}>{row.account||'-'}</span>
                  </td>
                  <td style={{padding:'8px 12px',fontWeight:600,color:'#111',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.site}</td>
                  <td style={{padding:'8px 12px',color:'#3b82f6',fontWeight:600}}>{fmtB(row.REF.sell)}</td>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{fmtB(row.REF.target)}</td>
                  <td style={{padding:'8px 12px',color:'#8b5cf6',fontWeight:600}}>{fmtB(row.WM.sell)}</td>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{fmtB(row.WM.target)}</td>
                  <td style={{padding:'8px 12px',color:'#f59e0b',fontWeight:600}}>{fmtB(row.AC.sell)}</td>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{fmtB(row.AC.target)}</td>
                  <td style={{padding:'8px 12px'}}>
                    <span style={{padding:'2px 8px',borderRadius:12,background:row.pc_status==='WORKING'?'#dcfce7':'#fef3c7',color:row.pc_status==='WORKING'?'#16a34a':'#d97706',fontSize:10,fontWeight:700}}>
                      {row.pc_status||'-'}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {preview.length>15&&(
            <div style={{padding:'10px 14px',textAlign:'center',color:'#9ca3af',fontSize:12,background:'#f8fafc'}}>
              ...และอีก {preview.length-15} สาขา
            </div>
          )}
        </div>
      </div>
    )}
  </div>);
}

// ============================================================
// PERFORMANCE PAGE
// ============================================================
function PerformancePage({feedbacks,activeSites,onNavigate,preSelect}){
  // Time Gone — คำนวณจากวันอาทิตย์ล่าสุด (ตรงกับ data cycle ยอดขาย)
  const today=new Date();
  const lastSunday=new Date(today);
  lastSunday.setDate(today.getDate()-today.getDay()); // ย้อนกลับไปวันอาทิตย์ล่าสุด
  // ถ้าวันนี้เป็นอาทิตย์ ใช้วันนี้เลย ถ้าไม่ใช้อาทิตย์ก่อนหน้า
  const refDate = today.getDay()===0 ? today : lastSunday;
  const dayOfMonth=refDate.getDate();
  const daysInMonth=new Date(refDate.getFullYear(),refDate.getMonth()+1,0).getDate();
  const timeGonePct=Math.round((dayOfMonth/daysInMonth)*100);
  const monthName=refDate.toLocaleDateString('th-TH',{month:'long',year:'numeric'});
  const refDateStr=refDate.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});

  const [region,setRegion]=useState(preSelect?.region||'ALL');
  const [asCode,setAsCode]=useState(preSelect?.as_code||'ALL');
  const [acFilter,setAcFilter]=useState('ALL');

  const regions=[...new Set(activeSites.map(s=>s.region))].sort();
  const availableAccounts=[...new Set(activeSites.map(s=>s.account||'Unknown').filter(Boolean))].sort();
  const availableRegions=[...new Set(
    (acFilter==='ALL'?activeSites:activeSites.filter(s=>s.account===acFilter)).map(s=>s.region)
  )].sort();
  const availableAS=[...new Set(
    activeSites.filter(s=>(acFilter==='ALL'||s.account===acFilter)&&(region==='ALL'||s.region===region)).map(s=>s.as_code)
  )].sort();

  const handleAccountFilterChange=e=>{setAcFilter(e.target.value);setRegion('ALL');setAsCode('ALL');};
  const handleRegionChange=e=>{setRegion(e.target.value);setAsCode('ALL');};

  const filteredSites=activeSites.filter(s=>
    (acFilter==='ALL'||s.account===acFilter)&&
    (region==='ALL'||s.region===region)&&
    (asCode==='ALL'||s.as_code===asCode)
  );

  // Summary totals
  const totalSell=CAT=>filteredSites.reduce((s,x)=>s+(x[CAT]?.sell||0),0);
  const totalTarget=CAT=>filteredSites.reduce((s,x)=>s+(x[CAT]?.target||0),0);
  const grandSell=totalSell('REF')+totalSell('WM')+totalSell('AC');
  const grandTarget=totalTarget('REF')+totalTarget('WM')+totalTarget('AC');
  const grandAch=grandTarget?Math.round((grandSell/grandTarget)*100):0;

  // Account groups — ดึงจาก sites ที่กรองแค่ Account+Region (ไม่กรอง AS Code)
  // เพื่อให้แสดงทุก Account แม้จะเลือก AS Code เฉพาะ
  const sitesForAccounts=activeSites.filter(s=>
    (acFilter==='ALL'||s.account===acFilter)&&
    (region==='ALL'||s.region===region)
  );
  const accounts=[...new Set(sitesForAccounts.map(s=>s.account||'Unknown'))].sort();
  // สีที่กำหนดตายตัวสำหรับ Account หลัก
  const ACCT_COLORS_FIXED={
    'Lotus':   {bg:'#E6F1FB',color:'#185FA5'},
    'BigC':    {bg:'#EEEDFE',color:'#534AB7'},
    'Makro':   {bg:'#E1F5EE',color:'#0F6E56'},
    'HOMEPRO': {bg:'#FFF3E0',color:'#E65100'},
  };
  // Palette สำหรับ Account ใหม่ที่เพิ่มขึ้นมา (สุ่มจาก hash ชื่อ)
  const PALETTE=[
    {bg:'#FCE4EC',color:'#880E4F'},{bg:'#F3E5F5',color:'#6A1B9A'},
    {bg:'#E8EAF6',color:'#283593'},{bg:'#E0F7FA',color:'#006064'},
    {bg:'#E8F5E9',color:'#1B5E20'},{bg:'#FFFDE7',color:'#F57F17'},
    {bg:'#FBE9E7',color:'#BF360C'},{bg:'#EFEBE9',color:'#4E342E'},
    {bg:'#F1F8E9',color:'#33691E'},{bg:'#E0F2F1',color:'#004D40'},
  ];
  function hashColor(str){
    let h=0;
    for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))>>>0;
    return PALETTE[h%PALETTE.length];
  }
  const getAcctColor=a=>ACCT_COLORS_FIXED[a]||hashColor(a||'Unknown');

  // Feedback status
  const fbMap={};
  feedbacks.filter(f=>f.week===THIS_WEEK).forEach(f=>{fbMap[f.site]=f;});
  const submitted=filteredSites.filter(s=>fbMap[s.site]).length;
  const belowTarget=filteredSites.filter(s=>{
    const refA=achPct(s.REF?.sell,s.REF?.target);
    const wmA=achPct(s.WM?.sell,s.WM?.target);
    const acA=achPct(s.AC?.sell,s.AC?.target);
    return Math.min(refA,wmA,acA)<80;
  }).length;

  // Sorted branch list
  const sortedSites=[...filteredSites].sort((a,b)=>{
    const avgA=(achPct(a.REF?.sell,a.REF?.target)+achPct(a.WM?.sell,a.WM?.target)+achPct(a.AC?.sell,a.AC?.target))/3;
    const avgB=(achPct(b.REF?.sell,b.REF?.target)+achPct(b.WM?.sell,b.WM?.target)+achPct(b.AC?.sell,b.AC?.target))/3;
    return avgA-avgB;
  });

  function achColor(p){
    if(p>=timeGonePct)return{bg:'#EAF3DE',color:'#3B6D11'};
    if(p>=80)return{bg:'#FAEEDA',color:'#854F0B'};
    return{bg:'#FCEBEB',color:'#A32D2D'};
  }
  function barColor(p){
    if(p>=timeGonePct)return'#3B6D11';
    if(p>=80)return'#BA7517';
    return'#E24B4A';
  }

  return(
    <div style={{maxWidth:1100,margin:'0 auto'}}>
      {/* Header */}
      <div style={{marginBottom:14}}>
        <div style={{fontWeight:700,fontSize:18,color:'#111'}}>[DA] Hyper Performance</div>
        <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>ยอดขายถึงวันที่ {refDateStr}</div>
      </div>

      {/* Filters — Account > Region > AS Code */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}}>
        <div>
          <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>Account</div>
          <select value={acFilter} onChange={handleAccountFilterChange} style={{...sel}}>
            <option value='ALL'>ทุก Account</option>
            {availableAccounts.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>Region</div>
          <select value={region} onChange={handleRegionChange} style={{...sel}}>
            <option value='ALL'>ทุก Region</option>
            {availableRegions.map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
        <div>
          <div style={{fontSize:11,color:'#6b7280',marginBottom:4}}>AS Code</div>
          <select value={asCode} onChange={e=>setAsCode(e.target.value)} style={{...sel}}>
            <option value='ALL'>ทุก AS Code</option>
            {availableAS.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
      </div>

      {/* Time Gone Banner */}
      <div style={{...card,padding:'14px 20px',marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
          <div style={{flex:1,minWidth:220}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:13,color:'#6b7280'}}>Time Gone — {monthName} <span style={{fontSize:11,color:'#9ca3af'}}>(ณ {refDateStr})</span></span>
              <span style={{fontSize:15,fontWeight:700,color:'#111'}}>{timeGonePct}%</span>
            </div>
            <div style={{height:8,borderRadius:4,background:'#e5e7eb',overflow:'hidden'}}>
              <div style={{height:'100%',width:`${timeGonePct}%`,background:'#378ADD',borderRadius:4,transition:'width 1s ease'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:11,color:'#9ca3af'}}>
              <span>ณ วันอาทิตย์ที่ {dayOfMonth} จาก {daysInMonth} วัน</span>
              <span>เหลืออีก {daysInMonth-dayOfMonth} วัน</span>
            </div>
          </div>
          <div style={{display:'flex',gap:20}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:20,fontWeight:700,color:'#111'}}>{filteredSites.length}</div>
              <div style={{fontSize:11,color:'#6b7280'}}>สาขาทั้งหมด</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:20,fontWeight:700,color:'#dc2626'}}>{belowTarget}</div>
              <div style={{fontSize:11,color:'#6b7280'}}>ต่ำกว่าเป้า</div>
            </div>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:20,fontWeight:700,color:'#16a34a'}}>{submitted}/{filteredSites.length}</div>
              <div style={{fontSize:11,color:'#6b7280'}}>Feedback</div>
            </div>
          </div>
        </div>
      </div>

      {/* Grand Total */}
      <div style={{...card,padding:'16px 20px',marginBottom:12,background:'#0f172a',color:'#fff'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
          <div>
            <div style={{fontSize:12,opacity:.6,marginBottom:4,letterSpacing:'.05em',textTransform:'uppercase'}}>ยอดขายรวมทุกห้าง (REF+WM+AC)</div>
            <div style={{fontSize:28,fontWeight:800,letterSpacing:'-.02em'}}>{fmtB(grandSell)}</div>
          </div>
          <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11,opacity:.5,marginBottom:2}}>เป้ารวม</div>
              <div style={{fontSize:18,fontWeight:700}}>{fmtB(grandTarget)}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11,opacity:.5,marginBottom:2}}>Ach% รวม</div>
              <div style={{fontSize:18,fontWeight:700,color:grandAch>=100?'#4ade80':grandAch>=80?'#fbbf24':'#f87171'}}>{grandAch}%</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11,opacity:.5,marginBottom:2}}>Time Gone</div>
              <div style={{fontSize:18,fontWeight:700,color:'#60a5fa'}}>{timeGonePct}%</div>
            </div>
          </div>
        </div>
      </div>

      {/* Category Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:16}}>
        {CATS.map(cat=>{
          const sell=totalSell(cat);
          const target=totalTarget(cat);
          const ap=achPct(sell,target);
          return(
            <div key={cat} style={{...card,padding:'14px 16px',borderLeft:`3px solid ${CAT_COLORS[cat]}`}}>
              <div style={{fontSize:12,color:'#6b7280',marginBottom:4,fontWeight:600}}>{cat} — {CAT_LABELS[cat]}</div>
              <div style={{fontSize:20,fontWeight:700,color:'#111'}}>{fmtB(sell)}</div>
              <div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>เป้า {fmtB(target)}</div>
              <div style={{height:4,borderRadius:2,background:'#e5e7eb',marginTop:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${Math.min(ap,100)}%`,background:barColor(ap),borderRadius:2}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
                <span style={{fontSize:11,fontWeight:700,color:barColor(ap)}}>{ap}%</span>
                <span style={{fontSize:11,color:'#9ca3af'}}>vs {timeGonePct}% time</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* Account Overview Chart */}
      <div style={{...card,marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,color:'#111',marginBottom:4}}>ภาพรวม Ach% แยกตาม Account & Category</div>
        <div style={{fontSize:12,color:'#6b7280',marginBottom:16}}>เส้นประแดง = Time Gone {timeGonePct}%</div>
        <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          {CATS.map(c=>(
            <span key={c} style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'#6b7280'}}>
              <span style={{width:10,height:10,borderRadius:2,background:CAT_COLORS[c],display:'inline-block'}}/>
              {c}
            </span>
          ))}
          <span style={{display:'flex',alignItems:'center',gap:5,fontSize:12,color:'#dc2626',marginLeft:8}}>
            <span style={{width:16,borderTop:'2px dashed #dc2626',display:'inline-block'}}/>
            Time Gone {timeGonePct}%
          </span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          {accounts.map(acct=>{
            const acctSites=filteredSites.filter(s=>(s.account||'Unknown')===acct);
            const {bg,color}=getAcctColor(acct);
            return(
              <div key={acct}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                  <span style={{padding:'3px 12px',borderRadius:20,background:bg,color,fontSize:12,fontWeight:700}}>{acct}</span>
                  <span style={{fontSize:11,color:'#9ca3af'}}>{acctSites.length} สาขา</span>
                </div>
                <div style={{position:'relative'}}>
                  <div style={{position:'absolute',left:`${timeGonePct}%`,top:0,bottom:0,borderLeft:'2px dashed #ef4444',zIndex:1,pointerEvents:'none'}}/>
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    {CATS.map(cat=>{
                      const sell=acctSites.reduce((s,x)=>s+(x[cat]?.sell||0),0);
                      const target=acctSites.reduce((s,x)=>s+(x[cat]?.target||0),0);
                      const ap=achPct(sell,target);
                      return(
                        <div key={cat} style={{display:'flex',alignItems:'center',gap:10}}>
                          <span style={{fontSize:11,color:'#6b7280',width:28,fontWeight:600}}>{cat}</span>
                          <div style={{flex:1,height:16,borderRadius:3,background:'#f1f5f9',overflow:'hidden',position:'relative'}}>
                            <div style={{height:'100%',width:`${Math.min(ap,100)}%`,background:CAT_COLORS[cat],borderRadius:3,opacity:.85}}/>
                          </div>
                          <span style={{fontSize:11,fontWeight:700,width:38,textAlign:'right',color:barColor(ap)}}>{ap}%</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Branch Cards — จัดกลุ่มตาม Account */}
      <div style={{...card,padding:0,overflow:'hidden'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid #f1f5f9'}}>
          <div style={{fontSize:14,fontWeight:700,color:'#111'}}>รายละเอียดแต่ละสาขา — เรียงจาก Ach% ต่ำสุด</div>
        </div>
        <div style={{padding:'16px'}}>
          {accounts.map(acct=>{
            const acctSites=sortedSites.filter(s=>(s.account||'Unknown')===acct);
            if(acctSites.length===0) return null;
            const {bg:aBg,color:aColor}=getAcctColor(acct);
            const CAT_BG={REF:'#E6F1FB',WM:'#EEEDFE',AC:'#E1F5EE'};
            const CAT_TEXT={REF:'#185FA5',WM:'#534AB7',AC:'#0F6E56'};
            return(
              <div key={acct} style={{marginBottom:24}}>
                {/* Account Header */}
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10,padding:'8px 14px',borderRadius:10,background:aBg}}>
                  <span style={{fontSize:13,fontWeight:500,color:aColor}}>{acct}</span>
                  <span style={{fontSize:11,color:aColor,opacity:.7}}>{acctSites.length} สาขา</span>
                  <div style={{flex:1,height:'1px',background:aColor,opacity:.2}}/>
                </div>
                {/* สาขาใน Account นั้น */}
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {acctSites.map(s=>{
                    const refA=achPct(s.REF?.sell,s.REF?.target);
                    const wmA=achPct(s.WM?.sell,s.WM?.target);
                    const acA=achPct(s.AC?.sell,s.AC?.target);
                    const fb=fbMap[s.site];
                    const catData=[
                      {cat:'REF',sell:s.REF?.sell||0,target:s.REF?.target||0,ap:refA},
                      {cat:'WM',sell:s.WM?.sell||0,target:s.WM?.target||0,ap:wmA},
                      {cat:'AC',sell:s.AC?.sell||0,target:s.AC?.target||0,ap:acA},
                    ];
                    return(
                      <div key={s.site} style={{background:'#fff',border:'0.5px solid #e5e7eb',borderRadius:12,padding:'12px 14px'}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,gap:8}}>
                          <div style={{flex:1,overflow:'hidden'}}>
                            <div style={{fontWeight:700,fontSize:13,color:'#111',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                              {s.site}{s.pc_status?<span style={{fontWeight:400,color:'#6b7280',fontSize:12}}> · {s.pc_status}</span>:''}
                            </div>
                          </div>
                          <button onClick={()=>onNavigate('survey',{region:s.region,as_code:s.as_code,site:s.site})}
                            style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:8,border:'0.5px solid #e5e7eb',background:'#f8fafc',color:'#374151',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',flexShrink:0}}>
                            📋 Survey
                          </button>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                          {catData.map(({cat,sell,target,ap})=>(
                            <div key={cat} style={{display:'flex',borderRadius:8,overflow:'hidden',border:'0.5px solid #e5e7eb'}}>
                              <div style={{background:CAT_BG[cat],display:'flex',alignItems:'center',justifyContent:'center',padding:'0 7px',minWidth:28}}>
                                <span style={{fontSize:9,fontWeight:700,color:CAT_TEXT[cat],writingMode:'vertical-rl',transform:'rotate(180deg)',letterSpacing:1}}>{cat}</span>
                              </div>
                              <div style={{flex:1,padding:'7px 9px',background:'#fff'}}>
                                <div style={{fontSize:12,fontWeight:700,color:'#111',marginBottom:2}}>{fmtB(sell)}</div>
                                <div style={{fontSize:10,color:'#9ca3af',marginBottom:5}}>/ {fmtB(target)}</div>
                                <span style={{padding:'2px 8px',borderRadius:4,background:achColor(ap).bg,color:achColor(ap).color,fontSize:11,fontWeight:700}}>{ap}%</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function App(){
  const [page,setPage]=useState('performance');
  const [feedbacks,setFeedbacks]=useState([]);
  const [sheetsUrl,setSheetsUrl]=useState('');
  const [liveSales,setLiveSales]=useState(null);
  const [loading,setLoading]=useState(true);
  const [unlocked,setUnlocked]=useState(false);
  const [surveyPreSelect,setSurveyPreSelect]=useState(null);

  const SHEETS_URL='https://script.google.com/macros/s/AKfycbwgqtEp_6RNtMDcopoerzdCdbi3bcZxW2AGA_vr5FqlCfrx0zfQ29k91Rjq4e5zhzw5/exec';

  // โหลด feedbacks จาก localStorage + ดึง sales จาก Sheets ทุกครั้งที่เปิดเว็บ
  useEffect(()=>{
    const fd=storage.get('wss_feedbacks_v2');
    const ls=storage.get('wss_live_sales');
    if(fd)setFeedbacks(JSON.parse(fd.value));
    if(ls)setLiveSales(JSON.parse(ls.value));

    // ดึงข้อมูลยอดขายล่าสุดจาก Google Sheets
    fetch(`${SHEETS_URL}?action=getSales`)
      .then(r=>r.json())
      .then(data=>{
        if(data.status==='ok'&&data.sites?.length>0){
          setLiveSales(data.sites);
          storage.set('wss_live_sales',JSON.stringify(data.sites));
        }
      })
      .catch(()=>{/* ใช้ข้อมูล localStorage แทน */})
      .finally(()=>setLoading(false));
  },[]);

  const activeSites=liveSales||MASTER_SITES;

  const handleUpdateSales=useCallback(async(newSites)=>{
    setLiveSales(newSites);
    storage.set('wss_live_sales',JSON.stringify(newSites));

    // ส่งทีละ 30 สาขา เพราะ GET URL มีขีดจำกัดความยาว
    const BATCH=30;
    const total=Math.ceil(newSites.length/BATCH);
    try{
      for(let i=0;i<total;i++){
        const batch=newSites.slice(i*BATCH,(i+1)*BATCH);
        const payload={
          action:'updateSales',
          batch:i,
          totalBatch:total,
          sites:batch,
          updatedAt:new Date().toISOString()
        };
        const encoded=encodeURIComponent(JSON.stringify(payload));
        await fetch(`${SHEETS_URL}?data=${encoded}`,{method:'GET',mode:'no-cors'});
        // หน่วงเวลาเล็กน้อยระหว่าง batch
        await new Promise(r=>setTimeout(r,500));
      }
    }catch(e){console.warn('Sync sales failed:',e);}
  },[]);

  const handleSubmit=useCallback(async(fb)=>{
    const updated=[...feedbacks,fb];
    setFeedbacks(updated);
    storage.set('wss_feedbacks_v2',JSON.stringify(updated));
    try{
      const encoded=encodeURIComponent(JSON.stringify(fb));
      await fetch(`${SHEETS_URL}?data=${encoded}`,{method:'GET',mode:'no-cors'});
    }catch(e){console.warn('Sheets sync failed:',e);}
  },[feedbacks]);

  const handleSaveUrl=useCallback(async(url)=>{
    setSheetsUrl(url);
    storage.set('wss_sheets_url',JSON.stringify(url));
  },[]);

  const PROTECTED=['admin','setup'];
  function handleNav(id,preSelect=null){
    if(PROTECTED.includes(id)&&!unlocked) setUnlocked(false);
    if(PROTECTED.includes(page)&&!PROTECTED.includes(id)) setUnlocked(false);
    setSurveyPreSelect(preSelect);
    setPage(id);
  }

  const pending=activeSites.filter(s=>!feedbacks.some(f=>f.site===s.site&&f.week===THIS_WEEK)).length;
  const navItems=[
    {id:'performance',label:'Performance',icon:'📈'},
    {id:'survey',label:'Survey',icon:'📋'},
    {id:'dashboard',label:'Dashboard',icon:'📊'},
    {id:'history',label:'ประวัติ',icon:'🕐'},
    {id:'admin',label:'Admin',icon:'📤',lock:true},
    {id:'setup',label:'Setup Sheets',icon:'⚙️',lock:true,dot:false},
  ];

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:44,height:44,borderRadius:'50%',border:'4px solid #e5e7eb',borderTopColor:'#1e293b',animation:'spin .8s linear infinite',margin:'0 auto 14px'}}/>
        <p style={{color:'#6b7280'}}>กำลังโหลด...</p>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      <div style={{background:'#0f172a',color:'#fff',padding:'0 20px'}}>
        <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',gap:16,height:58}}>
          <div>
            <div style={{fontWeight:800,fontSize:16}}>📊 Weekly Sales Survey</div>
            <div style={{fontSize:10,color:'#475569',marginTop:1}}>{THIS_WEEK}</div>
          </div>
          <div style={{fontSize:11,color:'#475569',background:'rgba(255,255,255,.07)',padding:'3px 10px',borderRadius:20}}>
            {activeSites.length} sites · 5 regions
            {liveSales&&<span style={{marginLeft:6,color:'#4ade80',fontWeight:700}}>· LIVE</span>}
          </div>
          <div style={{marginLeft:'auto',display:'flex',gap:3}}>
            {navItems.map(n=>(
              <button key={n.id} onClick={()=>handleNav(n.id)}
                style={{display:'flex',alignItems:'center',gap:6,padding:'7px 13px',borderRadius:8,border:'none',background:page===n.id?'rgba(255,255,255,.12)':'transparent',color:page===n.id?'#fff':'#94a3b8',fontSize:13,fontWeight:page===n.id?700:500,cursor:'pointer',position:'relative'}}>
                {n.icon} {n.label}
                {n.lock&&<span style={{fontSize:10,opacity:.6}}>🔒</span>}
                {n.dot&&<span style={{position:'absolute',top:3,right:3,width:7,height:7,borderRadius:'50%',background:'#ef4444'}}/>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 20px'}}>
        {pending>0&&page!=='setup'&&page!=='admin'&&(
          <div style={{padding:'11px 16px',borderRadius:12,background:'#fffbeb',border:'1px solid #fbbf24',color:'#92400e',fontSize:13,fontWeight:500,marginBottom:18}}>
            ⚠️ ยังมี <strong>{pending} สาขา</strong> ที่ยังไม่ได้ส่ง Feedback สัปดาห์นี้
          </div>
        )}
        {page==='survey'&&<SurveyPage feedbacks={feedbacks} onSubmit={handleSubmit} sheetsUrl={sheetsUrl} activeSites={activeSites} preSelect={surveyPreSelect} onNavigate={handleNav}/>}
        {page==='dashboard'&&<DashboardPage feedbacks={feedbacks} activeSites={activeSites}/>}
        {page==='performance'&&<PerformancePage feedbacks={feedbacks} activeSites={activeSites} onNavigate={handleNav} preSelect={surveyPreSelect}/>}
        {page==='history'&&<HistoryPage feedbacks={feedbacks} activeSites={activeSites}/>}
        {page==='admin'&&(!unlocked
          ?<PasscodeLock title='Admin — อัพโหลดยอดขาย' onUnlock={()=>setUnlocked(true)}/>
          :<AdminPage onUpdateSales={handleUpdateSales}/>
        )}
        {page==='setup'&&(!unlocked
          ?<PasscodeLock title='Setup Google Sheets' onUnlock={()=>setUnlocked(true)}/>
          :<SetupPage sheetsUrl={sheetsUrl} onSaveUrl={handleSaveUrl}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
