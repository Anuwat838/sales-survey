function getWeekLabel(d){
  const dt=new Date(d);
  dt.setDate(dt.getDate()-((dt.getDay()+6)%7));
  const sun=new Date(dt);sun.setDate(dt.getDate()+6);
  const f=x=>`${x.getDate()}/${x.getMonth()+1}/${x.getFullYear()}`;
  return `${f(dt)} - ${f(sun)}`;
}
const THIS_WEEK=getWeekLabel(new Date());
const TODAY=new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});

const fmtB=n=>'฿'+Number(n).toLocaleString('th-TH');
const achPct=(s,t)=>t?Math.round((s/t)*100):0;

const CATS=['REF','WM','AC'];

function SurveyPage({feedbacks,onSubmit,sheetsUrl,activeSites}){
  const [region,setRegion]=useState('');
  const [asCode,setAsCode]=useState('');
  const [site,setSite]=useState('');
  const [step,setStep]=useState('select');
  const [busy,setBusy]=useState(false);
  const [form,setForm]=useState({empId:'',catComments:{REF:'',WM:'',AC:''},catSituations:{REF:'',WM:'',AC:''},issues:[],overallComment:''});

  // build hierarchy from activeSites
  const regions=[...new Set(activeSites.map(s=>s.region))].sort();
  const regionASMap={};
  const asSitesMap={};
  activeSites.forEach(s=>{
    if(!regionASMap[s.region])regionASMap[s.region]=new Set();
    regionASMap[s.region].add(s.as_code);
    if(!asSitesMap[s.as_code])asSitesMap[s.as_code]=[];
    asSitesMap[s.as_code].push(s);
  });

  const asCodes=region?[...( regionASMap[region]||new Set())].sort():[];
  const sites=asCode?asSitesMap[asCode]||[]:[];
  const siteData=activeSites.find(s=>s.site===site);
  const done=feedbacks.some(f=>f.site===site&&f.week===THIS_WEEK);

  const toggleIssue=i=>setForm(p=>({...p,issues:p.issues.includes(i)?p.issues.filter(x=>x!==i):[...p.issues,i]}));

  const reset=()=>{setStep('select');setRegion('');setAsCode('');setSite('');setForm({empId:'',catComments:{REF:'',WM:'',AC:''},catSituations:{REF:'',WM:'',AC:''},issues:[],overallComment:''});};

  const submit=async()=>{
    if(!form.empId)return;
    setBusy(true);
    const payload={week:THIS_WEEK,region,as_code:asCode,account:siteData?.account||'',site,submittedAt:new Date().toISOString(),submitterName:form.empId,catSituations:form.catSituations,issues:form.issues,overallComment:form.overallComment,catComments:form.catComments,sales:{REF:siteData?.REF,WM:siteData?.WM,AC:siteData?.AC}};
    await onSubmit(payload);
    setBusy(false);setStep('done');
  };

  if(step==='done') return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'60vh',gap:20,textAlign:'center'}}>
      <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,#22c55e,#16a34a)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,color:'#fff',boxShadow:'0 8px 32px rgba(34,197,94,.35)'}}>✓</div>
      <div>
        <h2 style={{margin:'0 0 8px',fontSize:22}}>ส่ง Feedback สำเร็จ!</h2>
        <p style={{margin:0,color:'#6b7280',fontSize:14}}>{site} · {THIS_WEEK}</p>
        {sheetsUrl&&<p style={{margin:'8px 0 0',fontSize:13,color:'#3b82f6'}}>✓ บันทึก Google Sheets แล้ว</p>}
      </div>
      <button onClick={reset} style={btn('#1e293b')}>ส่ง Feedback สาขาอื่น</button>
    </div>
  );

  return(
    <div style={{maxWidth:700,margin:'0 auto'}}>
      <div style={card}>
        <label style={lbl}>1. เลือก Region</label>
        <select value={region} onChange={e=>{setRegion(e.target.value);setAsCode('');setSite('');}} style={sel}>
          <option value=''>-- เลือก Region --</option>
          {regions.map(r=><option key={r}>{r}</option>)}
        </select>
        {region&&<>
          <label style={{...lbl,marginTop:14}}>2. เลือก AS Code</label>
          <select value={asCode} onChange={e=>{setAsCode(e.target.value);setSite('');}} style={sel}>
            <option value=''>-- เลือก AS Code --</option>
            {asCodes.map(a=><option key={a}>{a}</option>)}
          </select>
        </>}
        {asCode&&<>
          <label style={{...lbl,marginTop:14}}>3. เลือกสาขา</label>
          <select value={site} onChange={e=>{setSite(e.target.value);setStep(e.target.value?'form':'select');}} style={sel}>
            <option value=''>-- เลือกสาขา ({sites.length} สาขา) --</option>
            {sites.map(s=><option key={s.site}>{s.site}</option>)}
          </select>
        </>}
        {site&&<p style={{margin:'10px 0 0',fontSize:12,color:'#6b7280'}}>สัปดาห์: {THIS_WEEK}</p>}
      </div>

      {site&&siteData&&(
        <div style={{...card,background:'linear-gradient(135deg,#0f172a,#1e3a5f)',color:'#fff',marginTop:16}}>
          <div style={{fontSize:11,opacity:.6,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:16}}>
            ยอดขายรวม · อัพเดต {TODAY} — {site}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
            {CATS.map(cat=>{
              const d=siteData[cat];const ap=achPct(d.sell,d.target);
              return(<div key={cat} style={{background:'rgba(255,255,255,.08)',borderRadius:10,padding:'12px 14px',borderTop:`3px solid ${CAT_COLORS[cat]}`}}>
                <div style={{fontSize:11,opacity:.7,fontWeight:700,marginBottom:6,color:CAT_COLORS[cat]}}>{cat} — {CAT_LABELS[cat]}</div>
                <div style={{fontSize:18,fontWeight:800}}>{fmtB(d.sell)}</div>
                <div style={{fontSize:11,opacity:.5,marginTop:4}}>เป้า {fmtB(d.target)}</div>
                <div style={{height:4,borderRadius:2,background:'rgba(255,255,255,.15)',marginTop:8,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${Math.min(ap,100)}%`,background:ap>=100?'#4ade80':ap>=80?'#fbbf24':'#f87171',borderRadius:2}}/>

function DashboardPage({feedbacks,activeSites}){
  const [rf,setRf]=useState('ALL');
  const [af,setAf]=useState('ALL');
  const [ac,setAc]=useState('ALL'); // account filter
  const [cv,setCv]=useState('REF');
  const [sb,setSb]=useState('ach_asc'); // default: ach% ต่ำสุดขึ้นก่อน

  const regions=[...new Set(activeSites.map(s=>s.region))].sort();

  // Account list ขึ้นกับ Region ที่เลือก
  const availableAccounts=[...new Set(
    (rf==='ALL'?activeSites:activeSites.filter(s=>s.region===rf))
    .map(s=>s.account||'Unknown').filter(Boolean)
  )].sort();

  // AS Codes ขึ้นกับ Region + Account ที่เลือก
  const availableAS=[...new Set(
    activeSites.filter(s=>
      (rf==='ALL'||s.region===rf)&&
      (ac==='ALL'||s.account===ac)
    ).map(s=>s.as_code)
  )].sort();

  const handleRegionChange=e=>{setRf(e.target.value);setAf('ALL');setAc('ALL');};
  const handleAccountChange=e=>{setAc(e.target.value);setAf('ALL');};

  const sites=activeSites.filter(s=>
    (rf==='ALL'||s.region===rf)&&
    (ac==='ALL'||s.account===ac)&&
    (af==='ALL'||s.as_code===af)
  );
  const fbMap={};
  feedbacks.filter(f=>f.week===THIS_WEEK).forEach(f=>{fbMap[f.site]=f;});
  const rows=sites.map(s=>({...s,fb:fbMap[s.site]||null,submitted:!!fbMap[s.site]}));
  const sorted=[...rows].sort((a,b)=>{
    if(sb==='ach_asc') return achPct(a[cv].sell,a[cv].target)-achPct(b[cv].sell,b[cv].target);
    if(sb==='ach_desc') return achPct(b[cv].sell,b[cv].target)-achPct(a[cv].sell,a[cv].target);
    if(sb==='sell') return b[cv].sell-a[cv].sell;
    return 0;
  });
  const ts=sites.reduce((s,x)=>s+x[cv].sell,0);
  const tt=sites.reduce((s,x)=>s+x[cv].target,0);
  const sub=rows.filter(r=>r.submitted).length;

  return(<div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      {[{l:'ยอดรวม '+cv,v:fmtB(ts),s:`${achPct(ts,tt)}% ของเป้า`,c:CAT_COLORS[cv]},
        {l:'เป้ารวม '+cv,v:fmtB(tt),s:`${sites.length} สาขา`,c:'#6b7280'},
        {l:'ส่ง Feedback',v:`${sub}/${rows.length}`,s:`${Math.round(sub/rows.length*100)}%`,c:sub===rows.length?'#16a34a':'#f59e0b'},
        {l:'ยังไม่ส่ง',v:rows.length-sub,s:'สาขา',c:rows.length-sub>0?'#ef4444':'#16a34a'}
      ].map(x=>(
        <div key={x.l} style={{...card,borderTop:`4px solid ${x.c}`,padding:'18px 20px'}}>
          <div style={{fontSize:11,color:'#6b7280',fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',marginBottom:6}}>{x.l}</div>
          <div style={{fontSize:22,fontWeight:800,color:x.c}}>{x.v}</div>
          <div style={{fontSize:12,color:'#9ca3af',marginTop:3}}>{x.s}</div>
        </div>
      ))}
    </div>

    <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
      <select value={rf} onChange={handleRegionChange} style={{...sel,width:'auto',padding:'9px 14px'}}>
        <option value='ALL'>ทุก Region</option>
        {regions.map(r=><option key={r}>{r}</option>)}
      </select>
      <select value={ac} onChange={handleAccountChange} style={{...sel,width:'auto',padding:'9px 14px'}}>
        <option value='ALL'>ทุก Account</option>
        {availableAccounts.map(a=><option key={a}>{a}</option>)}
      </select>
      <select value={af} onChange={e=>setAf(e.target.value)} style={{...sel,width:'auto',padding:'9px 14px'}}>
        <option value='ALL'>ทุก AS Code</option>
        {availableAS.map(a=><option key={a}>{a}</option>)}
      </select>
      <div style={{display:'flex',gap:6}}>
        {CATS.map(c=>(
          <button key={c} onClick={()=>setCv(c)}
            style={{padding:'9px 16px',borderRadius:10,border:`2px solid ${cv===c?CAT_COLORS[c]:'#e5e7eb'}`,background:cv===c?CAT_COLORS[c]+'15':'#fff',color:cv===c?CAT_COLORS[c]:'#6b7280',fontSize:13,fontWeight:700,cursor:'pointer'}}>
            {c}
          </button>
        ))}
      </div>
      <div style={{display:'flex',gap:6,marginLeft:'auto'}}>
        {[['ach_asc','% เป้า ↑ต่ำ'],['ach_desc','% เป้า ↓สูง'],['sell','ยอดขาย']].map(([v,l])=>(
          <button key={v} onClick={()=>setSb(v)}
            style={{padding:'9px 14px',borderRadius:10,border:`2px solid ${sb===v?'#1e293b':'#e5e7eb'}`,background:sb===v?'#1e293b':'#fff',color:sb===v?'#fff':'#6b7280',fontSize:13,fontWeight:600,cursor:'pointer'}}>
            {l}

    </div>

    <div style={{...card,padding:0,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1.2fr .8fr .8fr 1fr 70px',padding:'10px 18px',background:'#f8fafc',borderBottom:'1px solid #e5e7eb',fontSize:11,fontWeight:700,color:'#6b7280',letterSpacing:'.05em',textTransform:'uppercase'}}>
        <div>สาขา / AS</div><div>ยอดขาย {cv}</div><div>% เป้า</div><div>เป้า</div><div>Feedback</div><div style={{textAlign:'center'}}>สถานะ</div>
      </div>
      {sorted.map((row,i)=>{
        const ap=achPct(row[cv].sell,row[cv].target);
        return(<div key={row.site+i} style={{display:'grid',gridTemplateColumns:'2fr 1.2fr .8fr .8fr 1fr 70px',padding:'13px 18px',borderBottom:i<sorted.length-1?'1px solid #f1f5f9':'none',alignItems:'center'}}
          onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <div>
            <div style={{fontWeight:600,fontSize:13,color:'#111'}}>{row.site}</div>
            <div style={{fontSize:11,color:'#9ca3af',marginTop:2}}>
              {row.account&&<span style={{padding:'1px 6px',borderRadius:6,background:'#eff6ff',color:'#3b82f6',fontWeight:700,marginRight:5,fontSize:10}}>{row.account}</span>}
              {row.as_code} · {row.region}
            </div>
          </div>
          <div style={{fontWeight:700,fontSize:14}}>{fmtB(row[cv].sell)}</div>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:ap>=100?'#16a34a':ap>=80?'#f59e0b':'#ef4444'}}>{ap}%</div>
            <div style={{height:3,borderRadius:2,background:'#e5e7eb',marginTop:4,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${Math.min(ap,100)}%`,background:ap>=100?'#16a34a':ap>=80?'#f59e0b':'#ef4444'}}/>
            </div>
          </div>
          <div style={{fontSize:12,color:'#6b7280'}}>{fmtB(row[cv].target)}</div>
          <div style={{fontSize:12,color:'#6b7280'}}>{row.fb?<><div style={{fontWeight:600,color:'#111',fontSize:12}}>{row.fb.submitterName}</div></>:'-'}</div>
          <div style={{textAlign:'center'}}>
            <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'3px 8px',borderRadius:20,fontSize:11,fontWeight:700,background:row.submitted?'#dcfce7':'#fef3c7',color:row.submitted?'#16a34a':'#d97706'}}>
              {row.submitted?'✓ ส่ง':'รอ'}
            </span>
          </div>
        </div>);
      })}
    </div>
  </div>);
}

function SetupPage({sheetsUrl,onSaveUrl}){
  const [url,setUrl]=useState(sheetsUrl||'');
  const [saved,setSaved]=useState(false);

  const code=`function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    const ss = SpreadsheetApp.getActiveSpreadsheet();

    appendRow(ss, "ALL", [
      data.submittedAt, data.week, data.region, data.as_code, data.site,
      data.submitterName, (data.issues||[]).join(", "), data.overallComment,
      data.catSituations?.REF, data.catComments?.REF, data.sales?.REF?.sell, data.sales?.REF?.target,
      data.catSituations?.WM, data.catComments?.WM, data.sales?.WM?.sell, data.sales?.WM?.target,
      data.catSituations?.AC, data.catComments?.AC, data.sales?.AC?.sell, data.sales?.AC?.target,
    ]);

    ["REF","WM","AC"].forEach(cat => {
      appendRow(ss, cat, [
        data.submittedAt, data.week, data.region, data.as_code, data.site,
        data.submitterName, data.catSituations?.[cat], data.catComments?.[cat],
        data.sales?.[cat]?.sell, data.sales?.[cat]?.target,
        (data.issues||[]).join(", "),
      ]);
    });

    return ContentService.createTextOutput(JSON.stringify({status:"ok"}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({status:"error",msg:err.message}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function appendRow(ss, sheetName, row) {
  let sheet = ss.getSheetByName(sheetName);
  if (!sheet) {
    sheet = ss.insertSheet(sheetName);
    const headers = {
      ALL: ["Timestamp","Week","Region","AS Code","Site","รหัสพนักงาน","ปัญหา","ความเห็นรวม",

      WM:  ["Timestamp","Week","Region","AS Code","Site","รหัสพนักงาน","Situation","Comment","Sell","Target","ปัญหา"],
      AC:  ["Timestamp","Week","Region","AS Code","Site","รหัสพนักงาน","Situation","Comment","Sell","Target","ปัญหา"],
    };
    sheet.appendRow(headers[sheetName]||["Data"]);
    sheet.getRange(1,1,1,sheet.getLastColumn())
      .setBackground("#1e293b").setFontColor("#ffffff").setFontWeight("bold");
  }
  sheet.appendRow(row);
}`;

  return(<div style={{maxWidth:720,margin:'0 auto'}}>

      {[

          <div><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{t}</div><div style={{fontSize:13,color:'#6b7280',whiteSpace:'pre-line'}}>{d}</div></div>

          <span style={{fontSize:11,color:'#64748b',fontWeight:700,fontFamily:'monospace'}}>Apps Script Code</span>
          <button onClick={()=>navigator.clipboard.writeText(code).then(()=>alert('คัดลอกแล้ว!'))}
            style={{padding:'4px 12px',borderRadius:6,border:'1px solid #334155',background:'transparent',color:'#94a3b8',fontSize:11,cursor:'pointer'}}>

const ADMIN_PASSCODE = '1234'; // ← เปลี่ยน passcode ที่นี่ได้เลยครับ

function PasscodeLock({onUnlock,title}){
  const [input,setInput]=useState('');
  const [error,setError]=useState(false);
  const [shake,setShake]=useState(false);

  function handleKey(k){
    if(input.length>=6)return;
    const next=input+k;
    setInput(next);
    setError(false);
    if(next.length===ADMIN_PASSCODE.length){
      if(next===ADMIN_PASSCODE){
        onUnlock();
      } else {
        setShake(true);
        setError(true);
        setTimeout(()=>{setInput('');setShake(false);},600);
      }
    }
  }

  function handleDel(){setInput(p=>p.slice(0,-1));setError(false);}

  const keys=['1','2','3','4','5','6','7','8','9','','0','⌫'];

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh'}}>
      <div style={{background:'#fff',borderRadius:20,padding:'36px 32px',boxShadow:'0 8px 40px rgba(0,0,0,.12)',textAlign:'center',width:300}}>
        <div style={{fontSize:32,marginBottom:8}}>🔒</div>
        <h3 style={{margin:'0 0 4px',fontSize:18,fontWeight:700,color:'#111'}}>{title}</h3>
        <p style={{margin:'0 0 24px',fontSize:13,color:'#9ca3af'}}>กรอก Passcode เพื่อเข้าใช้งาน</p>

        {/* Dots */}
        <div style={{display:'flex',justifyContent:'center',gap:12,marginBottom:28,
          animation:shake?'shake .4s ease':'none'}}>
          {Array.from({length:ADMIN_PASSCODE.length}).map((_,i)=>(
            <div key={i} style={{width:14,height:14,borderRadius:'50%',
              background:i<input.length?(error?'#ef4444':'#1e293b'):'#e5e7eb',
              transition:'background .15s'}}/>
          ))}
        </div>

        {/* Keypad */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
          {keys.map((k,i)=>(
            <button key={i} onClick={()=>k==='⌫'?handleDel():k?handleKey(k):null}
              disabled={!k}
              style={{padding:'16px 0',borderRadius:12,border:'none',
                background:k?'#f1f5f9':'transparent',
                color:k==='⌫'?'#ef4444':'#1e293b',
                fontSize:k==='⌫'?20:20,fontWeight:700,cursor:k?'pointer':'default',
                transition:'all .1s',opacity:k?1:0}}>
              {k}
            </button>
          ))}
        </div>

        {error&&<p style={{margin:'16px 0 0',fontSize:13,color:'#ef4444',fontWeight:600}}>Passcode ไม่ถูกต้อง</p>}
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-8px)}80%{transform:translateX(4px)}}`}</style>
    </div>
  );
}

// ============================================================
// ADMIN PAGE — อัพโหลด Excel/CSV อัพเดตยอดขาย
// ============================================================
function AdminPage({onUpdateSales}){
  const [preview,setPreview]=useState(null);
  const [errors,setErrors]=useState([]);
  const [saved,setSaved]=useState(false);
  const [dragging,setDragging]=useState(false);
  const fileRef=useRef(null);

  // คอลัมน์ที่ต้องการจาก Excel (ตรงกับ BIG_C format)
  // Region | AS codename | Site Name | REF Sell Out | REF Target | ... | WM Sell Out | WM Target | ... | AC Sell Out | AC Target
  function parseWorkbook(wb){
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(rows.length<2){setErrors(['ไม่พบข้อมูลในไฟล์']);return;}

    const header=rows[0].map(h=>String(h).trim());
    // หา index คอลัมน์
    const findCol=(keywords)=>{
      const idx=header.findIndex(h=>keywords.some(k=>h.toLowerCase().includes(k.toLowerCase())));
      return idx;
    };
    const iRegion=findCol(['region']);
    const iAS=findCol(['as code','as codename','codename']);
    const iAccount=findCol(['account']);
    const iSite=findCol(['site name','site']);
    const iREFSell=findCol(['ref sell','ref so']);
    const iREFTarget=findCol(['ref target']);
    const iWMSell=findCol(['wm sell','wm so']);
    const iWMTarget=findCol(['wm target']);
    const iACSell=findCol(['ac sell','ac so']);
    const iACTarget=findCol(['ac target']);
    const iPCStatus=findCol(['pc status','status']);

    const errs=[];
    if(iRegion<0)errs.push('ไม่พบคอลัมน์ Region');
    if(iSite<0)errs.push('ไม่พบคอลัมน์ Site Name');
    if(iREFSell<0)errs.push('ไม่พบคอลัมน์ REF Sell Out');
    if(errs.length){setErrors(errs);return;}

    const parsed=[];
    rows.slice(1).forEach((row,i)=>{
      const region=String(row[iRegion]||'').trim();
      const as_code=String(row[iAS]||'').trim();
      const account=String(row[iAccount]||'').trim()||'Unknown';
      const site=String(row[iSite]||'').trim();
      if(!region||!site||region==='NA')return;
      parsed.push({
        region, as_code, account, site,
        REF:{sell:Number(row[iREFSell])||0, target:Number(row[iREFTarget])||0},
        WM:{sell:Number(row[iWMSell])||0, target:Number(row[iWMTarget])||0},
        AC:{sell:Number(row[iACSell])||0, target:Number(row[iACTarget])||0},
        pc_status:String(row[iPCStatus]||'').trim(),
      });
    });

    if(parsed.length===0){setErrors(['ไม่พบข้อมูลสาขา ตรวจสอบชื่อคอลัมน์ครับ']);return;}
    setErrors([]);
    setPreview(parsed);
  }

  function handleFile(file){
    if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['xlsx','xls','csv'].includes(ext)){setErrors(['รองรับเฉพาะ .xlsx, .xls, .csv เท่านั้น']);return;}
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        parseWorkbook(wb);
      }catch(err){setErrors(['อ่านไฟล์ไม่สำเร็จ: '+err.message]);}
    };
    reader.readAsArrayBuffer(file);
  }

  function handleDrop(e){
    e.preventDefault();setDragging(false);
    handleFile(e.dataTransfer.files[0]);
  }

  const [syncing,setSyncing]=useState(false);

  async function confirmUpdate(){
    setSyncing(true);
    await onUpdateSales(preview);
    setSyncing(false);
    setSaved(true);
    setPreview(null);
    setTimeout(()=>setSaved(false),4000);
  }

  const regions=[...new Set((preview||[]).map(s=>s.region))];
  const totalSites=(preview||[]).length;

  return(<div style={{maxWidth:760,margin:'0 auto'}}>
    {saved&&(
      <div style={{padding:'16px 20px',borderRadius:12,background:'#dcfce7',border:'1px solid #86efac',color:'#16a34a',fontWeight:700,marginBottom:20,fontSize:15}}>
        ✓ อัพเดตยอดขายสำเร็จ! {totalSites} สาขา — ระบบใช้ข้อมูลใหม่ทันที
      </div>
    )}

    {/* Upload Zone */}
    <div style={card}>
      <h3 style={{margin:'0 0 4px',fontSize:18,fontWeight:700}}>📤 อัพโหลดไฟล์ยอดขาย</h3>
      <p style={{margin:'0 0 20px',color:'#6b7280',fontSize:13}}>รองรับ .xlsx / .xls / .csv · โครงสร้างเดิมจาก BIG_C_APR_2026.xlsx</p>

      {/* Drop Zone */}
      <div
        onDragOver={e=>{e.preventDefault();setDragging(true);}}
        onDragLeave={()=>setDragging(false)}
        onDrop={handleDrop}
        onClick={()=>fileRef.current.click()}
        style={{border:`2px dashed ${dragging?'#3b82f6':'#cbd5e1'}`,borderRadius:14,padding:'40px 20px',textAlign:'center',cursor:'pointer',background:dragging?'#eff6ff':'#f8fafc',transition:'all .2s',marginBottom:16}}>
        <div style={{fontSize:40,marginBottom:12}}>📁</div>
        <div style={{fontWeight:700,fontSize:15,color:'#1e293b',marginBottom:6}}>ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือกไฟล์</div>
        <div style={{fontSize:12,color:'#94a3b8'}}>.xlsx · .xls · .csv</div>
        <input ref={fileRef} type='file' accept='.xlsx,.xls,.csv' style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
      </div>

      {/* รูปแบบคอลัมน์ที่ต้องการ */}
      <div style={{padding:'12px 16px',borderRadius:10,background:'#f1f5f9',fontSize:12,color:'#475569'}}>
        <div style={{fontWeight:700,marginBottom:6}}>📋 คอลัมน์ที่ต้องมีในไฟล์</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'6px 16px'}}>
          {['Region','AS codename','Account','Site Name','REF Sell Out','REF Target','WM Sell Out','WM Target','AC Sell Out','AC Target','PC Status'].map(c=>(
            <span key={c} style={{padding:'2px 8px',borderRadius:8,background:'#e2e8f0',fontFamily:'monospace',fontSize:11}}>{c}</span>
          ))}
        </div>
      </div>

      {/* Errors */}
      {errors.length>0&&(
        <div style={{marginTop:14,padding:'12px 16px',borderRadius:10,background:'#fef2f2',border:'1px solid #fecaca',color:'#dc2626',fontSize:13}}>
          {errors.map((e,i)=><div key={i}>⚠️ {e}</div>)}
        </div>
      )}
    </div>

    {/* Preview */}
    {preview&&(
      <div style={{...card,marginTop:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <div>
            <h4 style={{margin:0,fontSize:16,fontWeight:700}}>ตัวอย่างข้อมูลที่จะอัพเดต</h4>
            <p style={{margin:'4px 0 0',fontSize:13,color:'#6b7280'}}>{totalSites} สาขา · {regions.length} Region</p>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>{setPreview(null);setErrors([]);}}
              style={{padding:'10px 18px',borderRadius:10,border:'2px solid #e5e7eb',background:'#fff',color:'#6b7280',fontWeight:600,cursor:'pointer',fontSize:13}}>
              ยกเลิก
            </button>
            <button onClick={confirmUpdate} disabled={syncing}
              style={{padding:'10px 22px',borderRadius:10,border:'none',background:syncing?'#6b7280':'linear-gradient(135deg,#16a34a,#15803d)',color:'#fff',fontWeight:700,cursor:syncing?'not-allowed':'pointer',fontSize:14}}>
              {syncing?'⏳ กำลัง Sync...':'✓ ยืนยันอัพเดต '+totalSites+' สาขา'}
            </button>
          </div>
        </div>

        {/* Summary by Region */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
          {regions.map(r=>{
            const cnt=preview.filter(s=>s.region===r).length;
            return(<span key={r} style={{padding:'4px 12px',borderRadius:20,background:'#1e293b',color:'#fff',fontSize:12,fontWeight:600}}>
              {r}: {cnt} sites
            </span>);
          })}
        </div>

        {/* Table preview */}
        <div style={{overflowX:'auto',borderRadius:10,border:'1px solid #e5e7eb'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead>
              <tr style={{background:'#f8fafc'}}>
                {['Region','AS Code','Account','Site','REF Sell','REF Target','WM Sell','WM Target','AC Sell','AC Target','Status'].map(h=>(
                  <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:700,color:'#6b7280',borderBottom:'1px solid #e5e7eb',whiteSpace:'nowrap',fontSize:11}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {preview.slice(0,15).map((row,i)=>(
                <tr key={i} style={{borderBottom:'1px solid #f1f5f9'}}>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{row.region}</td>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{row.as_code}</td>
                  <td style={{padding:'8px 12px'}}>
                    <span style={{padding:'2px 8px',borderRadius:8,background:'#eff6ff',color:'#3b82f6',fontSize:11,fontWeight:700}}>{row.account||'-'}</span>
                  </td>
                  <td style={{padding:'8px 12px',fontWeight:600,color:'#111',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.site}</td>
                  <td style={{padding:'8px 12px',color:'#3b82f6',fontWeight:600}}>{fmtB(row.REF.sell)}</td>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{fmtB(row.REF.target)}</td>
                  <td style={{padding:'8px 12px',color:'#8b5cf6',fontWeight:600}}>{fmtB(row.WM.sell)}</td>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{fmtB(row.WM.target)}</td>
                  <td style={{padding:'8px 12px',color:'#f59e0b',fontWeight:600}}>{fmtB(row.AC.sell)}</td>
                  <td style={{padding:'8px 12px',color:'#6b7280'}}>{fmtB(row.AC.target)}</td>
                  <td style={{padding:'8px 12px'}}>
                    <span style={{padding:'2px 8px',borderRadius:12,background:row.pc_status==='WORKING'?'#dcfce7':'#fef3c7',color:row.pc_status==='WORKING'?'#16a34a':'#d97706',fontSize:10,fontWeight:700}}>
                      {row.pc_status||'-'}
                    </span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          {preview.length>15&&(
            <div style={{padding:'10px 14px',textAlign:'center',color:'#9ca3af',fontSize:12,background:'#f8fafc'}}>
              ...และอีก {preview.length-15} สาขา
            </div>
          )}
        </div>
      </div>
    )}
  </div>);
}

// ============================================================
// APP
// ============================================================
function App(){
  const [page,setPage]=useState('survey');
  const [feedbacks,setFeedbacks]=useState([]);
  const [sheetsUrl,setSheetsUrl]=useState('');
  const [liveSales,setLiveSales]=useState(null);
  const [loading,setLoading]=useState(true);
  const [unlocked,setUnlocked]=useState(false);

  const SHEETS_URL='https://script.google.com/macros/s/AKfycbwgqtEp_6RNtMDcopoerzdCdbi3bcZxW2AGA_vr5FqlCfrx0zfQ29k91Rjq4e5zhzw5/exec';

  // โหลด feedbacks จาก localStorage + ดึง sales จาก Sheets ทุกครั้งที่เปิดเว็บ
  useEffect(()=>{
    const fd=storage.get('wss_feedbacks_v2');
    const ls=storage.get('wss_live_sales');
    if(fd)setFeedbacks(JSON.parse(fd.value));
    if(ls)setLiveSales(JSON.parse(ls.value));

    // ดึงข้อมูลยอดขายล่าสุดจาก Google Sheets
    fetch(`${SHEETS_URL}?action=getSales`)
      .then(r=>r.json())
      .then(data=>{
        if(data.status==='ok'&&data.sites?.length>0){
          setLiveSales(data.sites);
          storage.set('wss_live_sales',JSON.stringify(data.sites));
        }
      })
      .catch(()=>{/* ใช้ข้อมูล localStorage แทน */})
      .finally(()=>setLoading(false));
  },[]);

  const activeSites=liveSales||MASTER_SITES;

  const handleUpdateSales=useCallback(async(newSites)=>{
    setLiveSales(newSites);
    storage.set('wss_live_sales',JSON.stringify(newSites));

    // ส่งทีละ 30 สาขา เพราะ GET URL มีขีดจำกัดความยาว
    const BATCH=30;
    const total=Math.ceil(newSites.length/BATCH);
    try{
      for(let i=0;i<total;i++){
        const batch=newSites.slice(i*BATCH,(i+1)*BATCH);
        const payload={
          action:'updateSales',
          batch:i,
          totalBatch:total,
          sites:batch,
          updatedAt:new Date().toISOString()
        };
        const encoded=encodeURIComponent(JSON.stringify(payload));
        await fetch(`${SHEETS_URL}?data=${encoded}`,{method:'GET',mode:'no-cors'});
        // หน่วงเวลาเล็กน้อยระหว่าง batch
        await new Promise(r=>setTimeout(r,500));
      }
    }catch(e){console.warn('Sync sales failed:',e);}
  },[]);

  const handleSubmit=useCallback(async(fb)=>{
    const updated=[...feedbacks,fb];
    setFeedbacks(updated);
    storage.set('wss_feedbacks_v2',JSON.stringify(updated));
    try{
      const encoded=encodeURIComponent(JSON.stringify(fb));
      await fetch(`${SHEETS_URL}?data=${encoded}`,{method:'GET',mode:'no-cors'});
    }catch(e){console.warn('Sheets sync failed:',e);}
  },[feedbacks]);

  const handleSaveUrl=useCallback(async(url)=>{
    setSheetsUrl(url);
    storage.set('wss_sheets_url',JSON.stringify(url));
  },[]);

  const PROTECTED=['admin','setup'];
  function handleNav(id){
    if(PROTECTED.includes(id)&&!unlocked) setUnlocked(false);
    if(PROTECTED.includes(page)&&!PROTECTED.includes(id)) setUnlocked(false);
    setPage(id);
  }

  const pending=activeSites.filter(s=>!feedbacks.some(f=>f.site===s.site&&f.week===THIS_WEEK)).length;
  const navItems=[
    {id:'survey',label:'Survey',icon:'📋'},
    {id:'dashboard',label:'Dashboard',icon:'📊'},
    {id:'history',label:'ประวัติ',icon:'🕐'},
    {id:'admin',label:'Admin',icon:'📤',lock:true},
    {id:'setup',label:'Setup Sheets',icon:'⚙️',lock:true,dot:!sheetsUrl},
  ];

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:44,height:44,borderRadius:'50%',border:'4px solid #e5e7eb',borderTopColor:'#1e293b',animation:'spin .8s linear infinite',margin:'0 auto 14px'}}/>
        <p style={{color:'#6b7280'}}>กำลังโหลด...</p>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      <div style={{background:'#0f172a',color:'#fff',padding:'0 20px'}}>
        <div style={{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',gap:16,height:58}}>
          <div>
            <div style={{fontWeight:800,fontSize:16}}>📊 Weekly Sales Survey</div>
            <div style={{fontSize:10,color:'#475569',marginTop:1}}>{THIS_WEEK}</div>
          </div>
          <div style={{fontSize:11,color:'#475569',background:'rgba(255,255,255,.07)',padding:'3px 10px',borderRadius:20}}>
            {activeSites.length} sites · 5 regions
            {liveSales&&<span style={{marginLeft:6,color:'#4ade80',fontWeight:700}}>· LIVE</span>}
          </div>
          <div style={{marginLeft:'auto',display:'flex',gap:3}}>
            {navItems.map(n=>(
              <button key={n.id} onClick={()=>handleNav(n.id)}
                style={{display:'flex',alignItems:'center',gap:6,padding:'7px 13px',borderRadius:8,border:'none',background:page===n.id?'rgba(255,255,255,.12)':'transparent',color:page===n.id?'#fff':'#94a3b8',fontSize:13,fontWeight:page===n.id?700:500,cursor:'pointer',position:'relative'}}>
                {n.icon} {n.label}
                {n.lock&&<span style={{fontSize:10,opacity:.6}}>🔒</span>}
                {n.dot&&<span style={{position:'absolute',top:3,right:3,width:7,height:7,borderRadius:'50%',background:'#ef4444'}}/>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:'0 auto',padding:'24px 20px'}}>
        {pending>0&&page!=='setup'&&page!=='admin'&&(
          <div style={{padding:'11px 16px',borderRadius:12,background:'#fffbeb',border:'1px solid #fbbf24',color:'#92400e',fontSize:13,fontWeight:500,marginBottom:18}}>
            ⚠️ ยังมี <strong>{pending} สาขา</strong> ที่ยังไม่ได้ส่ง Feedback สัปดาห์นี้
            {!sheetsUrl&&<span style={{marginLeft:12,color:'#d97706'}}>· Google Sheets ยังไม่ได้เชื่อมต่อ</span>}
          </div>
        )}
        {page==='survey'&&<SurveyPage feedbacks={feedbacks} onSubmit={handleSubmit} sheetsUrl={sheetsUrl} activeSites={activeSites}/>}
        {page==='dashboard'&&<DashboardPage feedbacks={feedbacks} activeSites={activeSites}/>}
        {page==='history'&&<HistoryPage feedbacks={feedbacks} activeSites={activeSites}/>}
        {page==='admin'&&(!unlocked
          ?<PasscodeLock title='Admin — อัพโหลดยอดขาย' onUnlock={()=>setUnlocked(true)}/>
          :<AdminPage onUpdateSales={handleUpdateSales}/>
        )}
        {page==='setup'&&(!unlocked
          ?<PasscodeLock title='Setup Google Sheets' onUnlock={()=>setUnlocked(true)}/>
          :<SetupPage sheetsUrl={sheetsUrl} onSaveUrl={handleSaveUrl}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
