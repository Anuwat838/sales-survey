const storage = {
  get(key) {
    try {
      const v = localStorage.getItem(key);
      return v ? {
        value: v
      } : null;
    } catch {
      return null;
    }
  },
  set(key, value) {
    try {
      localStorage.setItem(key, typeof value === 'string' ? value : JSON.stringify(value));
      return true;
    } catch {
      return null;
    }
  }
};
